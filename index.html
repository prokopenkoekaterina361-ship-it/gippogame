<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бегемот-Фармацевт: Финальная версия</title>
    <style>
        :root {
            --primary: #AD4310;
            --light: #FDC489;
            --white: #ffffff;
            --gray: #808080;
            --dark-gray: #404040;
            --bg-shelf: #e8e8e8;
            --danger: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--gray);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-console {
            width: 800px;
            max-width: 95vw;
            height: 600px;
            max-height: 90vh;
            background-color: var(--white);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 15px solid var(--primary);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .damage-flash { animation: flashRed 0.3s ease-out; }
        @keyframes flashRed {
            0% { border-color: var(--danger); box-shadow: 0 0 30px var(--danger); }
            100% { border-color: var(--primary); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        }

        #screen {
            width: 100%;
            flex-grow: 1;
            background-color: var(--bg-shelf);
            margin: 10px;
            border: 4px solid var(--dark-gray);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .shelf-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background-image: 
                linear-gradient(var(--primary) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 80px 60px;
            z-index: 0;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--primary);
            font-weight: bold;
            font-size: 22px;
            z-index: 10;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #fff;
            pointer-events: none;
        }

        .lives-container { display: flex; gap: 5px; font-size: 28px; letter-spacing: 2px; }
        .heart { transition: all 0.3s; filter: drop-shadow(1px 1px 0 rgba(0,0,0,0.2)); }
        .heart.lost { filter: grayscale(100%) brightness(0.7); transform: scale(0.8); opacity: 0.5; }

        /* --- СТИЛИ ДЛЯ БЕГЕМОТА --- */
        #player {
            position: absolute;
            bottom: -20px; /* Чуть опустил, чтобы ноги стояли "на полу" */
            width: 220px; /* Увеличил размер под новую картинку */
            height: auto;
            z-index: 5;
            display: flex;
            justify-content: center;
            will-change: transform;
            pointer-events: none;
        }

        .hippo-img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.4));
            transition: transform 0.1s linear;
        }
        
        .facing-left .hippo-img { transform: scaleX(-1); }
        
        /* Анимация испуга */
        .scared .hippo-img { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translateX(-5px) scaleX(-1); }
            20%, 80% { transform: translateX(5px) scaleX(-1); }
            30%, 50%, 70% { transform: translateX(-10px) scaleX(-1); }
            40%, 60% { transform: translateX(10px) scaleX(-1); }
        }
        .facing-right.scared .hippo-img { animation: shake-right 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake-right {
            10%, 90% { transform: translateX(-5px); }
            20%, 80% { transform: translateX(5px); }
            30%, 50%, 70% { transform: translateX(-10px); }
            40%, 60% { transform: translateX(10px); }
        }

        .item {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            z-index: 4;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.15));
            pointer-events: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 90%;
            padding: 10px 20px 20px 20px;
            box-sizing: border-box;
        }

        .game-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff8c8c, var(--primary));
            border: 5px solid var(--dark-gray);
            box-shadow: 0 6px 0 #5a2208, 0 10px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: white;
            transition: all 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-btn:active, .game-btn.pressed {
            transform: translateY(6px);
            box-shadow: 0 0 0 #5a2208, inset 0 5px 10px rgba(0,0,0,0.2);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: var(--primary);
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        h1 { margin: 0 0 10px 0; font-size: 32px; letter-spacing: 2px; }
        h2 { color: var(--dark-gray); margin: 10px 0; }
        
        input, select, button.menu-btn {
            padding: 12px 24px;
            margin: 8px;
            font-size: 18px;
            border: 3px solid var(--primary);
            border-radius: 8px;
            background: var(--light);
            color: var(--dark-gray);
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        button.menu-btn:hover {
            background: var(--primary);
            color: var(--white);
            transform: scale(1.05);
        }

        .settings-bar {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 101;
            align-items: center;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--primary);
            padding: 5px;
        }
        input[type=range] { accent-color: var(--primary); }

        @media (max-width: 600px) {
            #game-console { border-width: 8px; height: 100vh; border-radius: 0; }
            #player { width: 160px; bottom: -10px; }
            .game-btn { width: 60px; height: 60px; font-size: 24px; }
            h1 { font-size: 24px; }
            .lives-container { font-size: 22px; }
        }
    </style>
</head>
<body>

<div id="game-console">
    <div class="settings-bar">
        <button class="icon-btn" onclick="toggleSound()" id="sound-icon" title="Звук">🔊</button>
        <input type="range" min="0" max="100" value="50" oninput="setVolume(this.value)" style="width: 80px;" title="Громкость">
    </div>

    <div id="screen">
        <div class="shelf-bg"></div>
        
        <div class="hud">
            <span id="score-display">СЧЕТ: 0</span>
            <div class="lives-container" id="lives-display">
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
            </div>
        </div>

        <!-- Игрок с встроенным изображением -->
        <div id="player" class="facing-right">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAJYCAYAAAC+ZpjcAAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAAOxAAADsQBlSsOGwAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAACAASURBVHic7N13nBxl2f/x79293O29JCEJJYQQQu8dBBEVRVGxYEFEBRsqKioqKiIqKhZQsaGAIiIqIE1AQHrvvffeey+X3fn9sXs2u5vdnd2Z3dmZ+/167VeyM7sz852Z3dn7uq/nuhVSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSimllFJKKaWUUkoppZRSSim......" alt="Hippo Pharmacist" class="hippo-img">
        </div>

        <div id="items-container"></div>
    </div>

    <div class="controls">
        <div class="game-btn" id="btn-left" 
             onmousedown="startMove('left')" onmouseup="stopMove()" ontouchstart="startMove('left')" ontouchend="stopMove()">️</div>
        <div class="game-btn" id="btn-right" 
             onmousedown="startMove('right')" onmouseup="stopMove()" ontouchstart="startMove('right')" ontouchend="stopMove()">➡️</div>
    </div>

    <div id="menu-screen" class="overlay">
        <h1>БЕГЕМОТ-ФАРМАЦЕВТ</h1>
        <p style="font-size: 16px; margin-bottom: 20px;">Лови 💊 КАПСУЛЫ<br>Избегай 🍎 ФРУКТЫ!<br>3 ошибки = Конец игры</p>
        <input type="text" id="player-name" placeholder="Имя игрока" maxlength="10" value="Доктор">
        <select id="difficulty">
            <option value="easy">Легко 😌</option>
            <option value="medium" selected>Нормально </option>
            <option value="hard">Сложно 🔥</option>
        </select>
        <button class="menu-btn" onclick="startGame()">НАЧАТЬ ИГРУ</button>
        <p style="font-size: 14px; margin-top: 20px; color: var(--gray);">РЕКОРД: <span id="high-score">0</span></p>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title">ИГРА ОКОНЧЕНА</h1>
        <h2 id="end-score">Счет: 0</h2>
        <p id="end-reason" style="color: var(--danger); font-weight: bold; margin: 10px 0;"></p>
        <p id="end-record-msg" style="font-weight: bold; color: var(--primary);"></p>
        <div style="margin-top: 20px;">
            <button class="menu-btn" onclick="resetGame()">ЗАНОВО</button>
            <button class="menu-btn" onclick="showMenu()">МЕНЮ</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        colors: { primary: '#AD4310', light: '#FDC489' },
        playerSpeedPPS: 500, // Немного увеличил скорость для нового размера
        catchRadius: 80, // Увеличил радиус ловли под корзинку
        fruits: ['', '🍌', '🍊', '🍇', '🍑'],
        pills: ['💊', '💉', '🩹']
    };

    let state = {
        isPlaying: false,
        score: 0,
        lives: 3,
        playerName: 'Доктор',
        soundEnabled: true,
        volume: 0.5,
        highScore: parseInt(localStorage.getItem('hippoHighScore')) || 0,
        
        playerX: 0,
        moveDir: 0,
        baseFallSpeedPPS: 180,
        spawnRateMs: 1400,
        difficultyMultiplier: 1
    };

    let items = [];
    let gameLoopId;
    let spawnTimer;
    let lastTime = 0;

    // --- АУДИО ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    function playTone(freq, type, duration, volMod = 1) {
        if (!state.soundEnabled) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        const v = state.volume * volMod;
        gainNode.gain.setValueAtTime(v, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const SFX = {
        step: () => playTone(150, 'triangle', 0.05, 0.3),
        catch: () => playTone(800, 'sine', 0.1),
        hit: () => { 
            playTone(100, 'sawtooth', 0.3); 
            setTimeout(() => playTone(80, 'sawtooth', 0.4), 100); 
        },
        levelUp: () => {
            [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.15), i * 100));
        }
    };

    // --- УПРАВЛЕНИЕ ---
    document.addEventListener('keydown', (e) => {
        if (!state.isPlaying) return;
        if (['ArrowLeft','a','A'].includes(e.key)) startMove('left');
        if (['ArrowRight','d','D'].includes(e.key)) startMove('right');
    });

    document.addEventListener('keyup', (e) => {
        if (['ArrowLeft','a','A','ArrowRight','d','D'].includes(e.key)) stopMove();
    });

    function startMove(dir) {
        if (!state.isPlaying) return;
        state.moveDir = dir === 'left' ? -1 : 1;
        const btn = document.getElementById(dir === 'left' ? 'btn-left' : 'btn-right');
        if(btn) btn.classList.add('pressed');
        
        const p = document.getElementById('player');
        p.className = dir === 'left' ? 'facing-left' : 'facing-right';
    }

    function stopMove() {
        state.moveDir = 0;
        document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('pressed'));
    }

    // --- ЛОГИКА ИГРЫ ---
    function init() {
        document.getElementById('high-score').innerText = state.highScore;
    }

    function showMenu() {
        document.getElementById('end-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('high-score').innerText = state.highScore;
    }

    function startGame() {
        const nameInput = document.getElementById('player-name').value.trim();
        state.playerName = nameInput || 'Доктор';
        
        const diff = document.getElementById('difficulty').value;
        setDifficulty(diff);

        state.score = 0;
        state.lives = 3;
        state.isPlaying = true;
        state.moveDir = 0;
        items = [];
        
        const screenW = document.getElementById('screen').offsetWidth;
        // Центрируем: ширина игрока 220px, половина 110px
        state.playerX = (screenW / 2) - 110;
        
        document.getElementById('items-container').innerHTML = '';
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        
        updateHUD();
        updatePlayerPosition();

        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
        scheduleSpawn();
    }

    function setDifficulty(diff) {
        if (diff === 'easy') { state.baseFallSpeedPPS = 150; state.spawnRateMs = 1800; state.difficultyMultiplier = 0.8; }
        else if (diff === 'medium') { state.baseFallSpeedPPS = 200; state.spawnRateMs = 1300; state.difficultyMultiplier = 1.0; }
        else { state.baseFallSpeedPPS = 280; state.spawnRateMs = 900; state.difficultyMultiplier = 1.3; }
    }

    function scheduleSpawn() {
        if (!state.isPlaying) return;
        const speedFactor = Math.max(0.4, 1 - (state.score / 500));
        const delay = (state.spawnRateMs * speedFactor) + (Math.random() * 400 - 200);
        
        spawnTimer = setTimeout(() => {
            spawnItem();
            scheduleSpawn();
        }, Math.max(400, delay));
    }

    function spawnItem() {
        const screenW = document.getElementById('screen').offsetWidth;
        const minX = 40;
        const maxX = screenW - 70;
        const startX = minX + Math.random() * (maxX - minX);
        
        const fruitChance = 0.3 + (state.score / 1000); 
        const isFruit = Math.random() < Math.min(0.6, fruitChance);
        
        const emoji = isFruit 
            ? CONFIG.fruits[Math.floor(Math.random() * CONFIG.fruits.length)]
            : CONFIG.pills[Math.floor(Math.random() * CONFIG.pills.length)];

        const item = document.createElement('div');
        item.className = 'item';
        item.innerText = emoji;
        item.style.left = startX + 'px';
        item.style.top = '-40px';
        document.getElementById('items-container').appendChild(item);

        items.push({ 
            el: item, 
            x: startX, 
            y: -40,
            type: isFruit ? 'fruit' : 'pill',
            rot: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 10,
            active: true 
        });
    }

    function gameLoop(timestamp) {
        if (!state.isPlaying) return;
        const dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        updatePlayer(dt);
        updateItems(dt);
        
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function updatePlayer(dt) {
        if (state.moveDir !== 0) {
            const screenW = document.getElementById('screen').offsetWidth;
            const moveAmount = CONFIG.playerSpeedPPS * dt;
            
            state.playerX += state.moveDir * moveAmount;
            
            // Границы: ширина игрока 220px
            if (state.playerX < 0) state.playerX = 0;
            if (state.playerX > screenW - 220) state.playerX = screenW - 220;

            updatePlayerPosition();
            
            if (Math.random() < 0.15) SFX.step();
        }
    }

    function updatePlayerPosition() {
        document.getElementById('player').style.transform = `translateX(${state.playerX}px)`;
    }

    function updateItems(dt) {
        const screenH = document.getElementById('screen').offsetHeight;
        // Корзина находится примерно на уровне 35-40% от низа экрана
        const catchY = screenH - 280; 
        const floorY = screenH + 40;
        
        const levelBonus = Math.floor(state.score / 30) * 25;
        const currentSpeed = (state.baseFallSpeedPPS + levelBonus) * state.difficultyMultiplier;
        const moveStep = currentSpeed * dt;

        items.forEach(p => {
            if (!p.active) return;

            p.y += moveStep;
            p.rot += p.rotSpeed;
            
            p.el.style.top = p.y + 'px';
            p.el.style.transform = `rotate(${p.rot}deg)`;

            // Проверка столкновения
            if (p.y >= catchY - 40 && p.y <= catchY + 40) {
                const playerCenter = state.playerX + 110; // Половина ширины 220
                const itemCenter = p.x + 20;
                
                if (Math.abs(itemCenter - playerCenter) < CONFIG.catchRadius) {
                    handleCollision(p);
                }
            }

            if (p.y > floorY) {
                p.active = false;
                p.el.remove();
            }
        });

        items = items.filter(p => p.active);
    }

    function handleCollision(item) {
        item.active = false;
        item.el.remove();
        
        if (item.type === 'pill') {
            state.score += 10;
            SFX.catch();
            showFloatText(item.x, '+10', '#2ecc71');
            if (state.score % 30 === 0) SFX.levelUp();
        } else {
            state.lives--;
            SFX.hit();
            
            const consoleEl = document.getElementById('game-console');
            consoleEl.classList.remove('damage-flash');
            void consoleEl.offsetWidth; 
            consoleEl.classList.add('damage-flash');
            
            const playerEl = document.getElementById('player');
            playerEl.classList.add('scared');
            setTimeout(() => playerEl.classList.remove('scared'), 400);
            
            showFloatText(item.x, 'ФУЙ!', '#e74c3c');
        }
        
        updateHUD();
        
        if (state.lives <= 0) gameOver(false);
    }

    function showFloatText(xPx, text, color) {
        const el = document.createElement('div');
        el.innerText = text;
        el.style.position = 'absolute';
        el.style.left = xPx + 'px';
        el.style.top = '60%';
        el.style.transform = 'translateX(-50%)';
        el.style.color = color;
        el.style.fontWeight = 'bold';
        el.style.fontSize = '24px';
        el.style.zIndex = '20';
        el.style.pointerEvents = 'none';
        el.style.transition = 'all 0.6s ease-out';
        document.getElementById('screen').appendChild(el);
        
        requestAnimationFrame(() => {
            el.style.top = '45%';
            el.style.opacity = '0';
        });
        setTimeout(() => el.remove(), 600);
    }

    function updateHUD() {
        document.getElementById('score-display').innerText = `СЧЕТ: ${state.score}`;
        
        const hearts = document.querySelectorAll('.heart');
        hearts.forEach((h, i) => {
            if (i < state.lives) {
                h.classList.remove('lost');
                h.innerText = '❤️';
            } else {
                h.classList.add('lost');
                h.innerText = '🖤';
            }
        });
    }

    function gameOver(isWin) {
        state.isPlaying = false;
        cancelAnimationFrame(gameLoopId);
        clearTimeout(spawnTimer);

        const endScreen = document.getElementById('end-screen');
        const title = document.getElementById('end-title');
        const scoreTxt = document.getElementById('end-score');
        const reasonTxt = document.getElementById('end-reason');
        const recordMsg = document.getElementById('end-record-msg');

        endScreen.classList.remove('hidden');
        scoreTxt.innerText = `${state.playerName}, счет: ${state.score}`;
        
        title.innerText = "ИГРА ОКОНЧЕНА";
        title.style.color = CONFIG.colors.primary;
        reasonTxt.innerText = "Слишком много фруктов! ";
        
        recordMsg.innerText = state.score > state.highScore ? "🏆 НОВЫЙ РЕКОРД!" : `Рекорд: ${state.highScore}`;

        if (state.score > state.highScore) {
            state.highScore = state.score;
            localStorage.setItem('hippoHighScore', state.highScore);
        }
    }

    function resetGame() {
        startGame();
    }

    function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        document.getElementById('sound-icon').innerText = state.soundEnabled ? '🔊' : '🔇';
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function setVolume(val) {
        state.volume = val / 100;
    }

    init();
</script>
</body>
</html>
